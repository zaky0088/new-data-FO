<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Management System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📡 FIBER MANAGEMENT SYSTEM</h1>

<div class="form">
<input id="jalur" placeholder="Nama Jalur">
<input id="odp" placeholder="ODP">
<input id="core" type="number" placeholder="Core Used">
<input id="panjang" type="number" placeholder="Panjang (m)">
<input id="teknisi" placeholder="Teknisi">

<select id="status">
<option value="Active">Active</option>
<option value="Putus">Putus</option>
<option value="Maintenance">Maintenance</option>
</select>

<button onclick="tambahData()">Tambah</button>
</div>

  <div class="noc-bar">
  <h2>🛰️ NOC MONITORING MODE</h2>
  <div id="clock"></div>
  <div id="networkStatus">🟢 Network Normal</div>
  </div>
 
  <div class="dashboard">

<div class="card">
<h3>Total Jalur</h3>
<p id="totalJalur">0</p>
</div>

<div class="card">
<h3>Total Core Used</h3>
<p id="totalCore">0</p>
</div>

<div class="card danger">
<h3>Jalur Putus</h3>
<p id="jalurPutus">0</p>
</div>

<button onclick="logout()">Logout</button>    

</div>

<input type="text" id="search" placeholder="🔍 Cari ODP / Jalur..." onkeyup="cariData()">

<table>
<thead>
<tr>
<th>No</th>
<th>Jalur</th>
<th>ODP</th>
<th>Core</th>
<th>Panjang</th>
<th>Teknisi</th>
<th>Status</th>
<th>Aksi</th>
</tr>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</thead>

<tbody id="dataFiber"></tbody>
</table>

<script src="script.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</body>
</html>
