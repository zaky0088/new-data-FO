<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Management System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📡 FIBER MANAGEMENT SYSTEM</h1>

<div class="form">
<input id="jalur" placeholder="Nama Jalur">
<input id="odp" placeholder="ODP">
<input id="core" type="number" placeholder="Core Used">
<input id="panjang" type="number" placeholder="Panjang (m)">
<input id="teknisi" placeholder="Teknisi">

<select id="status">
<option value="Active">Active</option>
<option value="Putus">Putus</option>
<option value="Maintenance">Maintenance</option>
</select>

<button onclick="tambahData()">Tambah</button>
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Jalur</th>
<th>ODP</th>
<th>Core</th>
<th>Panjang</th>
<th>Teknisi</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="dataFiber"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
